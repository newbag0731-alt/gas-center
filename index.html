<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도시가스 관할 고객센터 찾기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .highlight { border: 4px solid #3b82f6; transform: scale(1.05); background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="bg-blue-700 text-white p-8 shadow-md text-center">
        <h1 class="text-3xl font-bold mb-2">🏢 도시가스 통합 고객센터</h1>
        <p class="text-blue-100">주소를 입력하시면 관할 센터를 안내해 드립니다.</p>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        
        <section class="bg-white p-8 rounded-2xl shadow-xl mb-10">
            <label class="block text-lg font-bold text-gray-700 mb-3">📍 고객 주소 입력</label>
            <div class="flex gap-2">
                <input type="text" id="addressInput" placeholder="예: 의정부시, 노원구 상계동..." 
                       class="flex-1 border-2 border-gray-300 p-4 rounded-xl focus:border-blue-500 outline-none text-lg"
                       oninput="matchCenter()">
                <button class="bg-blue-600 text-white px-6 rounded-xl font-bold hover:bg-blue-800">검색</button>
            </div>
            <p id="matchMsg" class="mt-3 text-blue-600 font-semibold"></p>
        </section>

        <h2 class="text-xl font-bold text-gray-800 mb-5 pl-2">우리 관할 고객센터 (12개소)</h2>
        <div id="centerGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="노원1">노원1</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="노원2">노원2</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="도봉">도봉</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="노원도봉">노원도봉</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="성북">성북</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="강북1">강북1</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="강북2">강북2</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="의정부1">의정부1</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="의정부2">의정부2</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="양주">양주</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="포천">포천</button>
            <button class="center-btn bg-white p-5 rounded-xl shadow font-bold text-gray-700 border-2 border-transparent transition-all" data-name="동두천">동두천</button>
        </div>
    </main>

    <script>
        function matchCenter() {
            const addr = document.getElementById('addressInput').value;
            const buttons = document.querySelectorAll('.center-btn');
            const msg = document.getElementById('matchMsg');
            
            // 모든 하이라이트 초기화
            buttons.forEach(btn => btn.classList.remove('highlight'));
            msg.innerText = "";

            if (!addr) return;

            // 간단한 매칭 로직 (형의 실제 담당 동네 데이터에 맞게 확장 가능)
            let target = "";
            if (addr.includes("의정부")) target = "의정부";
            else if (addr.includes("노원")) target = "노원";
            else if (addr.includes("도봉")) target = "도봉";
            else if (addr.includes("성북")) target = "성북";
            else if (addr.includes("강북")) target = "강북";
            else if (addr.includes("양주")) target = "양주";
            else if (addr.includes("포천")) target = "포천";
            else if (addr.includes("동두천")) target = "동두천";

            // 매칭된 단어가 포함된 버튼들 강조
            if (target) {
                buttons.forEach(btn => {
                    if (btn.getAttribute('data-name').includes(target)) {
                        btn.classList.add('highlight');
                        msg.innerText = `🔍 [${target}] 관할 센터로 안내해 드릴까요?`;
                    }
                });
            }
        }
    </script>
</body>
</html>
