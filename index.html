<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대륜이엔에스 통합 고객센터 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@500;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fdfbf9; }
        
        .center-btn { border: 1.5px solid #e2e8f0; cursor: pointer; transition: all 0.2s ease; }
        .center-btn:hover { border-color: #93c5fd; background-color: #eff6ff; }
        
        .highlight { 
            border-color: #3b82f6 !important; 
            background-color: #eff6ff !important; 
            color: #1d4ed8 !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.2);
        }

        .action-btn { transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2); }

        /* 팝업 등장 애니메이션 */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-pop { animation: popIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="pt-16 pb-10 px-6 max-w-4xl mx-auto w-full text-center">
        <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">
            대륜이엔에스 통합 <span class="text-blue-600">고객센터</span> 안내
        </h1>
    </header>

    <main class="max-w-4xl mx-auto px-6 w-full flex-grow pb-16">
        
        <section class="mb-14">
            <div class="relative">
                <input type="text" id="addressInput" 
                       placeholder="동/읍/면 이름을 입력하세요 (예: 상계동, 민락동, 옥정동)" 
                       class="w-full bg-white border-2 border-slate-200 p-5 md:p-6 rounded-2xl shadow-sm focus:border-blue-500 outline-none text-lg md:text-xl font-bold transition-all placeholder:text-slate-300"
                       oninput="matchCenter()">
            </div>
            <p id="matchMsg" class="mt-3 px-2 text-blue-600 font-bold text-lg h-6"></p>
        </section>

        <section class="mb-12">
            <h3 class="text-lg md:text-xl font-bold text-slate-700 pl-1 border-b-2 border-slate-800 inline-block pb-1 mb-4">서울지역</h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 md:gap-4">
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="노원1" onclick="showPhone('노원1')">노원1</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="노원2" onclick="showPhone('노원2')">노원2</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="노원도봉" onclick="showPhone('노원도봉')">노원도봉</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="도봉" onclick="showPhone('도봉')">도봉</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="강북1" onclick="showPhone('강북1')">강북1</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="강북2" onclick="showPhone('강북2')">강북2</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="성북" onclick="showPhone('성북')">성북</button>
            </div>
        </section>

        <section class="mb-16">
            <h3 class="text-lg md:text-xl font-bold text-slate-700 pl-1 border-b-2 border-slate-800 inline-block pb-1 mb-4">경기지역</h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 md:gap-4">
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="의정부1" onclick="showPhone('의정부1')">의정부1</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="의정부2" onclick="showPhone('의정부2')">의정부2</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="동두천" onclick="showPhone('동두천')">동두천</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="양주" onclick="showPhone('양주')">양주</button>
                <button class="center-btn bg-white p-4 md:p-5 rounded-xl font-bold text-slate-600 text-center" data-name="포천" onclick="showPhone('포천')">포천</button>
            </div>
        </section>

        <section class="pt-12 border-t-2 border-slate-100">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight text-center mb-10">빠르고 편리한 주요 서비스 신청</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5">
                <a href="https://www.daeryunens.com/daeryunens/customerservice/gasservice1.asp" target="_blank"
                   class="action-btn flex items-center justify-center gap-3 bg-blue-600 text-white p-5 md:p-6 rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all">
                    <span class="text-2xl">🔍</span> 도시가스 안전점검
                </a>
                
                <a href="https://www.daeryunens.com/daeryunens/customerservice/gasservice2.asp" target="_blank"
                   class="action-btn flex items-center justify-center gap-3 bg-white text-blue-700 p-5 md:p-6 rounded-2xl font-bold text-lg border-2 border-blue-100 hover:border-blue-300 hover:bg-blue-50 transition-all hover:text-blue-800">
                    <span class="text-2xl">🚚</span> 전출입(이사)
                </a>
                
                <a href="https://www.daeryunens.com/daeryunens/customerservice/gasservice3.asp" target="_blank"
                   class="action-btn flex items-center justify-center gap-3 bg-blue-600 text-white p-5 md:p-6 rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all">
                    <span class="text-2xl">🛑</span> 도시가스 공급중지
                </a>
            </div>
        </section>

    </main>

    <footer class="bg-slate-100 py-8 px-6 text-center text-slate-500 font-medium border-t border-slate-200">
        <p>빠르고 편리하게 주요 도시가스 서비스를 신청하실 수 있습니다.</p>
    </footer>

    <div id="phoneModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-8 max-w-sm w-full animate-pop relative">
            
            <button onclick="closePhoneModal()" class="absolute top-5 right-6 text-slate-400 hover:text-slate-600 text-3xl font-bold">
                &times;
            </button>

            <h2 id="modalTitle" class="text-2xl md:text-3xl font-black text-slate-800 mb-2 mt-2">센터명</h2>
            <p class="text-slate-500 text-sm mb-6 border-b-2 border-slate-100 pb-4">번호를 누르시면 바로 연결됩니다.</p>
            
            <div id="modalNumbers" class="space-y-3 mb-6">
                </div>
            
            <button onclick="closePhoneModal()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition-all text-lg">
                닫기
            </button>
        </div>
    </div>

    <script>
        // 전화번호 데이터 (대시 포맷)
        const phoneData = {
            "노원1": ["02-931-5200"],
            "노원2": ["02-951-6002", "02-948-4700"],
            "노원도봉": ["02-900-9440"],
            "도봉": ["02-908-2341", "02-908-2342"],
            "강북1": ["02-984-1306", "02-989-9944", "02-984-1390", "02-989-3268"],
            "강북2": ["02-985-8100"],
            "성북": ["02-942-2701", "02-942-2702", "02-942-1667", "02-942-1668"],
            "의정부1": ["031-873-8000"],
            "의정부2": ["031-851-6240", "031-872-9200"],
            "동두천": ["031-865-0846"],
            "양주": ["031-868-2300", "031-855-0815"],
            "포천": ["031-848-5656"]
        };

        // 팝업 열기 (모달 확실히 띄우는 로직)
        function showPhone(centerName) {
            const modal = document.getElementById('phoneModal');
            const title = document.getElementById('modalTitle');
            const numbersContainer = document.getElementById('modalNumbers');

            // 내용 채우기
            title.innerText = centerName;
            numbersContainer.innerHTML = '';

            const numbers = phoneData[centerName];
            if (numbers) {
                numbers.forEach(num => {
                    // 모바일 최적화: 높이를 충분히 주고(py-4), 아이콘과 텍스트를 크게 배치
                    const html = `
                        <a href="tel:${num.replace(/-/g, '')}" class="flex items-center justify-center gap-2 bg-blue-50 text-blue-700 font-bold text-xl md:text-2xl py-4 rounded-2xl hover:bg-blue-100 hover:text-blue-800 transition-all border border-blue-100 shadow-sm">
                            <span class="text-xl">📞</span> ${num}
                        </a>
                    `;
                    numbersContainer.insertAdjacentHTML('beforeend', html);
                });
            }

            // 모달 보이기
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // 팝업 닫기
        function closePhoneModal() {
            const modal = document.getElementById('phoneModal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        // 팝업 바깥(어두운 배경) 클릭해도 닫히게 설정
        document.getElementById('phoneModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePhoneModal();
            }
        });

        // 주소 매칭
        const centers = {
            "노원1": ["상계1", "상계2", "상계3", "상계4", "상계5", "상계8", "상계9", "상계10", "중계1", "중계4", "수락리버시티", "장암", "상계동", "중계동", "노원"],
            "노원2": ["상계6", "상계7", "하계", "공릉", "중계본", "중계2", "중계3", "상계동", "중계동", "노원"],
            "노원도봉": ["월계", "창1", "창2", "창3", "창4", "창5", "창동", "노원", "도봉"],
            "도봉": ["방학", "쌍문", "도봉"],
            "강북1": ["수유", "번1", "강북"],
            "강북2": ["미아", "번2", "번3", "강북"],
            "성북": ["상월곡", "하월곡", "길음", "석관", "장위", "이문", "래미안", "성북"],
            "의정부1": ["의정부", "가능", "녹양", "신곡2", "금오", "자일"],
            "의정부2": ["민락", "용현", "고산", "낙양", "산곡", "호원", "신곡1", "장암"],
            "동두천": ["동두천", "생연", "보산", "걸산", "안흥", "상봉암", "하봉암", "탑동", "상패", "송내", "지행", "광암", "연천", "전곡", "군남", "청산", "백학", "미산", "왕징", "신서", "중면", "장남"],
            "양주": ["양주", "유양", "어둔", "남방", "마전", "산북", "광사", "만송", "삼숭", "고읍", "덕정", "봉양", "회암", "율정", "옥정", "고암", "덕계", "회정", "백석", "은현", "남면", "광적", "장흥", "회천"],
            "포천": ["포천", "신읍", "어룡", "자작", "선단", "설운", "동교", "소흘", "군내", "내촌", "가산", "신북", "창수", "영중", "일동", "이동", "영북", "관인", "화현"]
        };

        function matchCenter() {
            const rawVal = document.getElementById('addressInput').value.replace(/\s/g, "");
            const btns = document.querySelectorAll('.center-btn');
            const msg = document.getElementById('matchMsg');
            
            btns.forEach(b => b.classList.remove('highlight'));
            msg.innerText = "";

            if (rawVal.length < 2) return;

            const searchVal = rawVal.replace(/(시|군|구|읍|면|동|리)$/, "");
            let found = new Set();

            for (const [center, keywords] of Object.entries(centers)) {
                for (const kw of keywords) {
                    if (rawVal.includes(kw) || (searchVal.length >= 2 && kw.includes(searchVal))) {
                        found.add(center);
                    }
                }
            }

            if (found.size > 0) {
                found.forEach(f => {
                    const target = document.querySelector(`.center-btn[data-name="${f}"]`);
                    if (target) target.classList.add('highlight');
                });
                msg.innerText = `✔ ${Array.from(found).join(', ')} 관할 확인 완료!`;
            } else {
                msg.innerText = "😢 관할 구역을 찾을 수 없습니다.";
            }
        }
    </script>
</body>
</html>
