<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도시가스 고객센터 통합안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .center-btn { transition: all 0.2s ease; }
        /* 매칭되었을 때 효과: 테두리가 진해지고 살짝 커짐 */
        .highlight { 
            border: 3px solid #6366f1 !important; 
            background-color: #eef2ff !important; 
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 pb-20">

    <header class="bg-white border-b border-slate-200 p-6 mb-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">🏢 도시가스 관할찾기</h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-5 space-y-10">
        
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Address Search</h2>
            <input type="text" id="addressInput" 
                   placeholder="동 이름이나 시 이름을 입력하세요 (예: 상계동, 의정부)" 
                   class="w-full bg-slate-50 border-none p-5 rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none text-lg font-medium transition"
                   oninput="matchCenter()">
            <p id="matchMsg" class="mt-4 text-indigo-600 font-bold min-h-[1.5rem]"></p>
        </section>

        <section>
            <div class="flex items-center gap-3 mb-5">
                <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">SEOUL</span>
                <h3 class="text-xl font-bold text-slate-700">서울 관할 지역</h3>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="노원1">노원1</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="노원2">노원2</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="노원도봉">노원도봉</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="도봉">도봉</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="강북1">강북1</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="강북2">강북2</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="성북">성북</button>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-3 mb-5">
                <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold">GYEONGGI</span>
                <h3 class="text-xl font-bold text-slate-700">경기 관할 지역</h3>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="의정부1">의정부1</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="의정부2">의정부2</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="동두천">동두천</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="양주">양주</button>
                <button class="center-btn bg-white border border-slate-200 p-5 rounded-2xl font-bold text-slate-600" data-name="포천">포천</button>
            </div>
        </section>

    </main>

    <script>
        function matchCenter() {
            const addr = document.getElementById('addressInput').value.trim();
            const buttons = document.querySelectorAll('.center-btn');
            const msg = document.getElementById('matchMsg');
            
            buttons.forEach(btn => btn.classList.remove('highlight'));
            msg.innerText = "";

            if (addr.length < 2) return; // 두 글자 이상 입력 시 작동

            let target = [];

            // 상세 로직 적용
            if (addr.match(/상계[1-5]|상계8|상계9|상계10|중계1|중계4|수락리버/)) target.push("노원1");
            if (addr.match(/상계6|상계7|하계|공릉|중계본|중계2|중계3/)) target.push("노원2");
            if (addr.match(/월계|창[1-5]/)) target.push("노원도봉");
            if (addr.match(/방학|쌍문|도봉/)) target.push("도봉");
            if (addr.match(/수유|번1/)) target.push("강북1");
            if (addr.match(/미아|번2|번3/)) target.push("강북2");
            if (addr.match(/상월곡|하월곡|길음|석관|장위|이문|래미안/)) target.push("성북");
            
            if (addr.match(/의정부동|의정부1|의정부2|의정부3|가능|녹양|신곡2|금오|자일/)) target.push("의정부1");
            if (addr.match(/민락|용현|고산|낙양|산곡|호원|신곡1|장암/)) target.push("의정부2");
            if (addr.includes("동두천") || addr.includes("연천")) target.push("동두천");
            if (addr.includes("양주")) target.push("양주");
            if (addr.includes("포천")) target.push("포천");

            // 매칭된 버튼 강조
            if (target.length > 0) {
                target.forEach(name => {
                    const btn = document.querySelector(`.center-btn[data-name="${name}"]`);
                    if (btn) btn.classList.add('highlight');
                });
                msg.innerText = `💡 ${target.join(', ')} 관할 지역입니다.`;
            }
        }
    </script>
</body>
</html>
