<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도시가스 통합 고객센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-blue-600 text-white p-6 shadow-lg">
        <h1 class="text-2xl font-bold text-center">🏢 도시가스 민원 및 요금 통합 관리</h1>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-8">
        
        <section class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-bold mb-4 text-blue-700">📋 신규 민원 등록</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" placeholder="고객명" class="border p-3 rounded w-full">
                <input type="text" placeholder="연락처" class="border p-3 rounded w-full">
                <select class="border p-3 rounded w-full col-span-1 md:col-span-2">
                    <option>민원 유형 선택</option>
                    <option>요금 문의 (서울/경기)</option>
                    <option>시설 누수/위험 신고</option>
                    <option>이사 전출입 신청</option>
                    <option>계량기 고장/교체</option>
                </select>
                <textarea placeholder="민원 상세 내용을 입력하세요 (3,000건 데이터 자동 분류 예정)" class="border p-3 rounded w-full col-span-1 md:col-span-2 h-32"></textarea>
                <button class="bg-blue-500 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition w-full col-span-1 md:col-span-2">
                    민원 등록하기
                </button>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500">
            <h2 class="text-xl font-bold mb-4 text-green-700">🧮 지역별 요금 간편 계산</h2>
            <div class="flex space-x-4 mb-4">
                <label class="flex items-center space-x-2">
                    <input type="radio" name="region" value="seoul" checked> <span>서울</span>
                </label>
                <label class="flex items-center space-x-2">
                    <input type="radio" name="region" value="gyeonggi"> <span>경기도</span>
                </label>
            </div>
            <input type="number" placeholder="사용량 (m³)" class="border p-3 rounded w-full mb-4">
            <div class="bg-gray-100 p-4 rounded-lg text-center font-mono text-xl">
                예상 납부 금액: <span class="text-blue-600 font-bold">0원</span>
            </div>
        </section>

    </main>

    <footer class="text-center p-10 text-gray-400 text-sm">
        © 2026 도시가스 고객센터 관리 시스템. All rights reserved.
    </footer>

</body>
</html>
